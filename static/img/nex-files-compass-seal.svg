<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">neX-Files compass seal</title>
  <desc id="desc">An ornate brass compass and celestial seal with an eight-point star and nexus X motif.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0b2"/>
      <stop offset=".22" stop-color="#e7bd62"/>
      <stop offset=".52" stop-color="#b87826"/>
      <stop offset=".78" stop-color="#f0c66e"/>
      <stop offset="1" stop-color="#8d581d"/>
    </linearGradient>
    <radialGradient id="ink" cx="42%" cy="36%" r="72%">
      <stop offset="0" stop-color="#293139"/>
      <stop offset=".72" stop-color="#12181d"/>
      <stop offset="1" stop-color="#090d11"/>
    </radialGradient>
    <radialGradient id="gem" cx="35%" cy="28%" r="68%">
      <stop offset="0" stop-color="#d4796f"/>
      <stop offset=".34" stop-color="#9b433e"/>
      <stop offset="1" stop-color="#431917"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="15" stdDeviation="14" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f4ca76" flood-opacity=".32"/>
    </filter>
  </defs>

