name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    env:
      NEX_REPOS_ROOT: ${{ github.workspace }}
    steps:
      - name: Check out nexFiles
        uses: actions/checkout@v4
        with:
          path: nex-files
          fetch-depth: 0

      - name: Check out nexSys4 documentation
        uses: actions/checkout@v4
        with:
          repository: NexusUnleashed/nexsys4
          path: nexsys4

      - name: Check out nexMap4 documentation
        uses: actions/checkout@v4
        with:
          repository: NexusUnleashed/nexmap4
          path: nexmap4

      - name: Check out nexGui4 documentation
        uses: actions/checkout@v4
        with:
          repository: NexusUnleashed/nexgui4
          path: nexgui4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nex-files/package-lock.json

      - name: Install dependencies
        working-directory: nex-files
        run: npm ci

      - name: Build website
        working-directory: nex-files
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nex-files/build

  deploy:
    name: Deploy
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
