name: Test deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-deploy:
    name: Test production build
    runs-on: ubuntu-latest
    steps:
      - name: Check out nexFiles
        uses: actions/checkout@v7
        with:
          path: nex-files
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nex-files/package-lock.json

      - name: Install dependencies
        working-directory: nex-files
        run: npm ci

      - name: Test production build
        working-directory: nex-files
        run: npm run build
